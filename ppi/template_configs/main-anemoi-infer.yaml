# Docs:
# https://anemoi.readthedocs.io/projects/inference/en/latest/inference/configs/top-level.html

checkpoint: /lustre/storeB/project/fou/hi/foccus/experiments/lam-gridind-res10-2017-24-cloud-less-gpu/checkpoint/inference-anemoi-by_time-epoch_017-step_041581.ckpt

date: 2024-03-02 #specifies the reference date of the forecast (the starting date)

lead_time: 2h # specifies the forecast lead time in hours

device: cuda
#runner: parallel # run across multiple gpus

#input: test # use the dataset that was used during training as input. test (default), training or validation

# You can also provide a full dataset specification as follows:
# (e.g. as done in training)


input:
  dataset:
    cutout:
    - dataset:
        join: # joining all main and forcing datasets from 2023-2024
          - concat: 
            - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/norkystv3_hindcast_2023_surface.zarr
            - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/norkystv3_hindcast_2024_surface.zarr
            frequency: 3h
          - concat:
            - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/forcing_norkystv3_hindcast_zarr/forcing_norkystv3_hindcast_2023.zarr
              start: 2023
              end: 2023
            - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/forcing_norkystv3_hindcast_zarr/forcing_norkystv3_hindcast_2024.zarr
              start: 2024
              end: 2024
            frequency: 3h
        adjust: ["start", "end"]
      trim_edge: 10
    - join:
      - concat: 
        - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/norkystv3_hindcast_2023_surface.zarr
        - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/norkystv3_hindcast_2024_surface.zarr
        frequency: 3h
      - concat:
        - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/forcing_norkystv3_hindcast_zarr/forcing_norkystv3_hindcast_2023.zarr
          start: 2023
          end: 2023
        - dataset: /lustre/storeB/project/fou/hi/foccus/datasets/forcing_norkystv3_hindcast_zarr/forcing_norkystv3_hindcast_2024.zarr
          start: 2024
          end: 2024
      adjust: ["start", "end"]
    adjust: all

# Or get only output on the lam area
output:
  extract_lam:
    output:
      netcdf:
        path: /lustre/storeB/project/fou/hi/foccus/mateuszm/run-anemoi-ocean/ppi/gh200-test.nc

# its also possible to output truth
